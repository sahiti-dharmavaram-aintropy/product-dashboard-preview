<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Dashboard</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      background: #1a1f35;
      color: white;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      border-bottom: 1px solid #252d50;
      flex-shrink: 0;
      z-index: 10;
    }
    .logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px; color: white;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99,102,241,0.4);
    }
    .header-title {
      font-size: 15px; font-weight: 600; color: #e2e8f0; letter-spacing: 0.01em;
    }
    .api-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #64748b;
      background: #252d50; border-radius: 20px; padding: 3px 10px;
    }
    .api-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-live  { background: #22c55e; }
    .dot-mock  { background: #f59e0b; }
    .dot-check { background: #64748b; }

    /* ── Layout ─────────────────────────────────────────── */
    .app-body { display: flex; height: calc(100vh - 52px); overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 210px; flex-shrink: 0;
      background: #1a1f35;
      border-right: 1px solid #252d50;
      display: flex; flex-direction: column;
      overflow-y: auto;
      padding-top: 12px;
    }
    .sidebar-label {
      padding: 6px 16px 4px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #3d4f72;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px; color: #8b9abf;
      border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .nav-item:hover { background: #212845; color: #c7d2fe; }
    .nav-item.active {
      background: #212845;
      color: #818cf8;
      border-left-color: #818cf8;
    }
    .nav-icon { font-size: 13px; width: 18px; text-align: center; opacity: 0.85; }
    .nav-count {
      margin-left: auto;
      font-size: 10px; font-weight: 700;
      background: #252d50; color: #64748b;
      border-radius: 10px; padding: 1px 6px;
    }
    .nav-item.active .nav-count { background: #312e81; color: #a5b4fc; }

    /* ── Main ─────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      padding: 14px 24px 13px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .section-title { font-size: 17px; font-weight: 700; color: #0f172a; }
    .run-count-badge {
      background: #eff6ff; color: #3b82f6;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
    }

    .controls {
      padding: 10px 24px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .search-wrap { position: relative; flex: 1; max-width: 340px; }
    .search-ico {
      position: absolute; left: 9px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8; font-size: 13px; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 7px 11px 7px 30px;
      border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 13px; color: #1e293b;
      background: #f8fafc; outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #818cf8; background: white; }
    .db-select {
      padding: 7px 10px;
      border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 13px; color: #374151;
      background: white; cursor: pointer; outline: none;
    }
    .refresh-btn {
      padding: 7px 14px;
      background: #4f46e5; color: white;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .refresh-btn:hover { background: #4338ca; }
    .refresh-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Table ─────────────────────────────────────────────── */
    .table-wrap { flex: 1; overflow-y: auto; }
    .runs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .runs-table thead {
      position: sticky; top: 0;
      background: #f8fafc; z-index: 1;
    }
    .runs-table th {
      padding: 9px 16px;
      text-align: left;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      color: #64748b; border-bottom: 1px solid #e2e8f0;
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    .runs-table th:hover { color: #1e293b; }
    .runs-table th:hover .col-edit-btn { opacity: 1 !important; }
    .runs-table th:hover .col-filter-btn { opacity: 1 !important; }
    .col-filter-btn { opacity:0; font-size:10px; cursor:pointer; color:#6366f1; padding:0 2px; flex-shrink:0; transition:opacity 0.15s; }
    .col-filter-active { opacity:1 !important; color:#dc2626 !important; }
    .col-resize-handle { position:absolute; right:0; top:0; bottom:0; width:4px; cursor:col-resize; }
    .col-resize-handle:hover { background:#6366f1; }
    .filter-dropdown { position:absolute; top:100%; left:0; z-index:200; background:white; border:1px solid #e2e8f0; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,0.13); min-width:180px; display:flex; flex-direction:column; }
    .filter-dropdown-search { padding:6px 8px; border-bottom:1px solid #f1f5f9; }
    .filter-dropdown-search input { width:100%; padding:3px 7px; font-size:12px; border:1px solid #e2e8f0; border-radius:4px; outline:none; box-sizing:border-box; }
    .filter-dropdown-list { overflow-y:auto; max-height:190px; padding:3px 0; }
    .filter-dropdown-item { display:flex; align-items:center; gap:7px; padding:4px 11px; cursor:pointer; font-size:12px; }
    .filter-dropdown-item:hover { background:#f8fafc; }
    .filter-dropdown-actions { padding:5px 10px; border-top:1px solid #f1f5f9; }
    .filter-dropdown-actions button { font-size:11px; padding:2px 8px; border-radius:3px; border:1px solid #e2e8f0; cursor:pointer; background:white; }
    .filter-dropdown-actions button:hover { background:#f1f5f9; }
    .excel-toolbar { display:flex; align-items:center; gap:8px; padding:5px 14px; border-bottom:1px solid #e2e8f0; background:#f8fafc; font-size:12px; color:#64748b; flex-shrink:0; }
    .excel-chip { padding:2px 8px; border-radius:10px; font-size:11px; display:inline-flex; align-items:center; gap:4px; }
    .excel-chip span { cursor:pointer; } .excel-chip span:hover { opacity:0.7; }
    .cols-toggle-btn { font-size:12px; padding:3px 9px; border-radius:4px; border:1px solid #e2e8f0; background:white; cursor:pointer; }
    .cols-toggle-btn:hover { background:#f1f5f9; }
    .cols-toggle-panel { position:absolute; top:100%; right:0; z-index:200; background:white; border:1px solid #e2e8f0; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,0.13); min-width:160px; max-height:280px; overflow-y:auto; padding:4px 0; margin-top:2px; }
    .cols-toggle-item { display:flex; align-items:center; gap:8px; padding:5px 12px; cursor:pointer; font-size:12px; }
    .cols-toggle-item:hover { background:#f8fafc; }
    .runs-table th.sort-active { color: #4f46e5; }
    .runs-table td {
      padding: 10px 16px;
      border-bottom: 1px solid #f1f5f9;
      color: #374151; vertical-align: middle;
    }
    .runs-table tbody tr { cursor: pointer; transition: background 0.1s; }
    .runs-table tbody tr:hover td { background: #f8fafc; }
    .runs-table tbody tr.row-expanded td { background: #eef2ff; }
    .runs-table tbody tr.expanded-content-row { cursor: default; }
    .runs-table tbody tr.expanded-content-row:hover td { background: transparent; }

    .run-id {
      font-family: 'SFMono-Regular', 'Consolas', monospace;
      font-size: 12px; color: #4f46e5; font-weight: 600;
      background: #eef2ff; padding: 2px 6px; border-radius: 4px;
    }
    .ts { color: #64748b; font-size: 12px; white-space: nowrap; }
    .cell-main { font-weight: 500; color: #1e293b; }
    .cell-muted { color: #94a3b8; font-size: 12px; }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 12px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .s-completed { background: #dcfce7; color: #15803d; }
    .s-completed .badge-dot { background: #22c55e; }
    .s-running   { background: #dbeafe; color: #1d4ed8; }
    .s-running   .badge-dot { background: #3b82f6; animation: blink 1.4s infinite; }
    .s-active    { background: #dbeafe; color: #1d4ed8; }
    .s-active    .badge-dot { background: #3b82f6; animation: blink 1.4s infinite; }
    .s-failed    { background: #fee2e2; color: #dc2626; }
    .s-failed    .badge-dot { background: #ef4444; }
    .s-pending   { background: #f1f5f9; color: #64748b; }
    .s-pending   .badge-dot { background: #94a3b8; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* Metric cell */
    .metric-wrap { display: flex; align-items: center; gap: 8px; }
    .metric-val { font-weight: 600; color: #0f172a; font-size: 13px; min-width: 42px; }
    .metric-bar-bg { flex: 1; max-width: 72px; height: 4px; background: #e2e8f0; border-radius: 2px; }
    .metric-bar-fill { height: 100%; background: #4f46e5; border-radius: 2px; }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 2px 7px;
      background: #f1f5f9; color: #475569;
      border-radius: 4px; font-size: 11px; font-weight: 500;
    }

    /* Expand chevron */
    .chevron {
      display: inline-block; font-size: 10px;
      color: #94a3b8; margin-right: 6px;
      transition: transform 0.18s;
    }
    .chevron.open { transform: rotate(90deg); }

    /* Expanded content */
    .expanded-panel {
      padding: 16px 24px 20px 52px;
      background: #eef2ff;
      border-top: 1px solid #c7d2fe;
    }
    .expanded-panel-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: #6366f1; margin-bottom: 12px;
    }
    .expanded-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .expanded-field {
      background: white; border: 1px solid #e0e7ff;
      border-radius: 8px; padding: 10px 13px;
    }
    .expanded-key {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      color: #a5b4fc; margin-bottom: 4px;
    }
    .expanded-val {
      font-size: 13px; color: #1e293b; font-weight: 500;
      word-break: break-word;
    }

    /* Empty / loading states */
    .state-center {
      padding: 72px 24px; text-align: center; color: #94a3b8;
    }
    .state-icon { font-size: 36px; margin-bottom: 12px; }
    .state-msg  { font-size: 14px; }
    .spinner {
      display: inline-block; width: 26px; height: 26px;
      border: 3px solid #e2e8f0; border-top-color: #4f46e5;
      border-radius: 50%; animation: spin 0.65s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Overview cards */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px; padding: 24px;
    }
    .ov-card {
      background: white; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 18px 20px;
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .ov-card:hover {
      border-color: #818cf8;
      box-shadow: 0 3px 14px rgba(129,140,248,0.14);
    }
    .ov-card-icon { font-size: 22px; margin-bottom: 8px; }
    .ov-card-title { font-size: 13px; font-weight: 700; color: #1e293b; margin-bottom: 3px; }
    .ov-card-meta  { font-size: 12px; color: #94a3b8; }
    .ov-card-meta strong { color: #6366f1; }

    /* ── KPI Dashboard ──────────────────────────────────────── */
    .kpi-page { padding: 24px; overflow-y: auto; height: 100%; }
    .kpi-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .kpi-card {
      background: white; border: 1px solid #e2e8f0;
      border-radius: 12px; padding: 20px 22px;
      border-top: 4px solid #6366f1;
    }
    .kpi-card-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: #94a3b8; margin-bottom: 10px;
    }
    .kpi-card-value { font-size: 34px; font-weight: 800; color: #0f172a; line-height: 1; }
    .kpi-card-unit  { font-size: 14px; font-weight: 500; color: #64748b; margin-left: 3px; }
    .kpi-card-sub   { font-size: 12px; color: #94a3b8; margin-top: 8px; }
    .kpi-section {
      background: white; border: 1px solid #e2e8f0;
      border-radius: 12px; padding: 20px 22px; margin-bottom: 20px;
    }
    .kpi-section-title {
      font-size: 13px; font-weight: 700; color: #1e293b;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid #e2e8f0;
    }
    .kpi-delta-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .kpi-delta-table th {
      padding: 8px 14px; text-align: left;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      color: #64748b; border-bottom: 2px solid #e2e8f0;
    }
    .kpi-delta-table td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; }
    .kpi-delta-table tr:last-child td { border-bottom: none; }
    .delta-pos { color: #16a34a; font-weight: 700; }
    .delta-neg { color: #dc2626; font-weight: 700; }
    .kpi-source-note { font-size: 11px; color: #94a3b8; margin-top: 10px; }

    /* ── New Product Dashboard ─────────────────────────────── */
    .dash-tabs { display: flex; gap: 0; padding: 0 32px; background: white;
                 border-bottom: 1px solid #f1f5f9; }
    .dash-tab { padding: 14px 18px; cursor: pointer; font-size: 13px;
                font-weight: 500; color: #94a3b8; border-bottom: 2px solid transparent;
                user-select: none; transition: color 0.15s, border-color 0.15s;
                letter-spacing: -0.1px; }
    .dash-tab:hover { color: #475569; }
    .dash-tab.active { color: #0f172a; border-bottom-color: #0f172a; font-weight: 600; }
    .dash-tab-icon { display: none; }  /* drop emoji icons */

    .dash-sprint-bar { display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
                       padding: 14px 32px; background: white;
                       border-bottom: 1px solid #f1f5f9; font-size: 12px; color: #64748b; }
    .sprint-badge { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .sprint-badge-row { display: flex; align-items: baseline; gap: 10px; }
    .sprint-badge-num { font-size: 14px; font-weight: 700; color: #0f172a; letter-spacing: -0.2px; }
    .sprint-badge-dates { font-size: 12px; color: #94a3b8; font-weight: 400; }
    .sprint-badge-progress { height: 3px; background: #f1f5f9; border-radius: 2px; overflow: hidden;
                             margin-top: 6px; width: 220px; max-width: 100%; }
    .sprint-badge-progress-fill { height: 100%; background: #0f172a;
                                   border-radius: 2px; transition: width 0.3s; }
    .sprint-badge-progress-label { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .sprint-stats { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .dash-sprint-stat { display: inline-flex; align-items: center; gap: 6px;
                        padding: 5px 10px; border-radius: 16px;
                        border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.15s;
                        background: white; color: #475569; }
    .dash-sprint-stat:hover { border-color: #94a3b8; background: #f8fafc; }
    .dash-sprint-stat strong { color: #0f172a; font-weight: 600; }
    .dash-sprint-stat .pct { color: #64748b; font-weight: 500; }
    .dash-sprint-refreshed { margin-left: auto; color: #94a3b8; font-size: 11px;
                             display: inline-flex; align-items: center; gap: 8px; }
    .dash-sprint-refreshed a { color: #475569; text-decoration: none; padding: 4px 8px;
                               border-radius: 4px; transition: background 0.15s; }
    .dash-sprint-refreshed a:hover { background: #f1f5f9; color: #0f172a; }

    .quality-subhead { font-size: 11px; font-weight: 600; color: #94a3b8;
                       margin: 0 0 14px; text-transform: uppercase; letter-spacing: 0.6px; }

    .dash-section { background: transparent; border: none; padding: 0;
                    margin-bottom: 36px; }
    .dash-section-head { display: flex; align-items: baseline; gap: 12px;
                         padding-bottom: 14px; margin-bottom: 18px;
                         border-bottom: 1px solid #f1f5f9; }
    .dash-section-num { color: #cbd5e1; font-size: 11px; font-weight: 600;
                        font-variant-numeric: tabular-nums;
                        background: transparent; padding: 0; flex-shrink: 0;
                        letter-spacing: 0.5px; }
    .dash-section-title { font-size: 15px; font-weight: 600; color: #0f172a;
                          letter-spacing: -0.2px; }
    .dash-section-hint { font-size: 12px; color: #94a3b8; margin-left: auto;
                         font-weight: 400; }
    .dash-section-link { color: #64748b; text-decoration: none; font-size: 12px;
                         display: inline-flex; align-items: center; gap: 4px;
                         padding: 3px 8px; border-radius: 4px; transition: all 0.15s; }
    .dash-section-link:hover { background: #f1f5f9; color: #0f172a; }
    .dash-section-link::after { content: '↗'; font-size: 11px; opacity: 0.6; }

    .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .tile { background: white; border: 1px solid #f1f5f9; border-radius: 10px;
            padding: 16px 18px; cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
            display: flex; flex-direction: column; gap: 8px; min-height: 118px;
            position: relative; }
    .tile:hover { border-color: #cbd5e1; box-shadow: 0 1px 3px rgba(15,23,42,0.04),
                                                       0 4px 12px rgba(15,23,42,0.04); }
    .tile:active { transform: translateY(1px); }
    .tile.tile-unavailable { background: #fafbfc; cursor: default; border-style: dashed;
                              border-color: #e2e8f0; }
    .tile.tile-unavailable:hover { border-color: #e2e8f0; box-shadow: none; }
    .tile.tile-stale { border-color: #fbbf24; background: #fffdf5; }
    .tile.tile-stale .tile-label { color: #b45309; }
    .tile-label { font-size: 11px; font-weight: 500; text-transform: none;
                  letter-spacing: 0; color: #64748b; }
    .tile-value { font-size: 32px; font-weight: 700; color: #0f172a; line-height: 1;
                  letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
    .tile.tile-unavailable .tile-value { color: #e2e8f0; font-weight: 500; }
    .tile-unit { font-size: 13px; font-weight: 400; color: #94a3b8; margin-left: 4px; }
    .tile-sub { font-size: 11px; color: #94a3b8; line-height: 1.5; }
    .tile-meta { font-size: 11px; color: #cbd5e1; margin-top: auto;
                 display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
                 font-weight: 400; }
    .tile-stale-pill { background: #fef3c7; color: #b45309; padding: 1px 6px; border-radius: 8px;
                       font-size: 10px; font-weight: 600; }
    .tile-placeholder-pill { background: #f1f5f9; color: #94a3b8; padding: 1px 6px; border-radius: 8px;
                             font-size: 10px; font-weight: 500; }
    .tile-fresh-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
    .tile-blocker { font-size: 11px; color: #94a3b8; font-style: normal;
                    border-top: 1px dashed #e2e8f0; padding-top: 8px; margin-top: auto;

  // ── Route resolver ─────────────────────────────────────────────────
  function applyFilters(rows, params) {
    let out = rows.slice();
    params.forEach((value, key) => {
      if (key === 'page' || !value) return;
      out = out.filter(r => String(r[key] ?? '') === String(value));
    });
    return out;
  }

  function handle(url) {
    const u = new URL(url, window.location.origin);
    const path = u.pathname;
    const params = u.searchParams;

    if (path === '/api/dashboard') {
      // Refresh feels broken if computed_at never moves. Stamp it per call so
      // "Updated X ago" actually updates when the user hits refresh.
      return { ...SNAPSHOT, computed_at: new Date().toISOString() };
    }
    if (path === '/api/datasets')                         return DATASETS;
    if (path === '/api/tables')                           return Object.keys(TABLES);
    if (path === '/api/feedback')                         return FEEDBACK_ROWS;
    if (path === '/api/kpi-summary')                      return SNAPSHOT.build.product_quality;

    const issuesMatch = path.match(/^\/api\/dashboard\/issues\/([^/]+)$/);
    if (issuesMatch) {
      const slice = issuesMatch[1];
      const items = ISSUE_FIXTURES[slice] || [];
      const realRepo = slice === 'papers' || slice === 'collaterals'
        ? 'aintropy-ai/publications' : 'aintropy-ai/aintropy-engine-product';
      return { available: true, slice, sprint: SNAPSHOT.sprint, items: items.map(i => ({
        number: i.number, title: i.title,
        url: `https://github.com/${realRepo}/issues/${i.number}`,
        state: i.state,
        labels: i.labels, created_at: i.created_at, closed_at: i.closed_at,
        assignees: i.assignees,
      })) };
    }

    const fkMatch = path.match(/^\/api\/table\/([^/]+)\/foreign-keys$/);
    if (fkMatch) return FK_MAP[fkMatch[1]] || [];

    const fkValMatch = path.match(/^\/api\/table\/([^/]+)\/fk-values\/([^/]+)$/);
    if (fkValMatch) {
      const [_, t, col] = fkValMatch;
      const rows = TABLES[t] || [];
      const set = new Set(rows.map(r => r[col]).filter(v => v != null));
      return [...set].sort();
    }

    const tableMatch = path.match(/^\/api\/table\/([^/]+)$/);
    if (tableMatch) {
      const t = tableMatch[1];
      return applyFilters(TABLES[t] || [], params);
    }

    const portalSessionsMatch = path === '/api/portal-ui-test/sessions';
    if (portalSessionsMatch) return TABLES.portal_ui_test_session;
    const portalResultsMatch = path.match(/^\/api\/portal-ui-test\/results\/(.+)$/);
    if (portalResultsMatch) return TABLES.portal_ui_test_result.filter(r => r.session_id === portalResultsMatch[1]);

    const webRunsMatch = path === '/api/website-ui-test/runs';
    if (webRunsMatch) return TABLES.website_ui_test_run;
    const webChecksMatch = path.match(/^\/api\/website-ui-test\/checks\/(.+)$/);
    if (webChecksMatch) return TABLES.website_ui_test_check.filter(r => r.session_id === webChecksMatch[1]);

    return null;
  }
