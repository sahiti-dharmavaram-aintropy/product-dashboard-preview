      const result = handle(url);
      if (result !== null) {
        return Promise.resolve(new Response(JSON.stringify(result), {
          status: 200, headers: { 'Content-Type': 'application/json' }
        }));
      }
      // Unknown route → 404 so app can fall back
      return Promise.resolve(new Response(JSON.stringify({ detail: 'Not found' }), {
        status: 404, headers: { 'Content-Type': 'application/json' }
      }));
    }
    return origFetch.apply(this, arguments);
  };

  // Banner so anyone hitting the URL knows it's a mocked preview
  window.addEventListener('DOMContentLoaded', () => {
    const banner = document.createElement('div');
    banner.textContent = 'Preview · all data is mocked';
    banner.style.cssText = 'position:fixed;bottom:8px;right:8px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;padding:4px 10px;border-radius:6px;font:11px -apple-system,sans-serif;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,0.08);';
    document.body.appendChild(banner);
  });
})();
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === ''
  ? 'http://127.0.0.1:8000'
  : '';


/* ─── Utilities ───────────────────────────────────────────────── */
function toRunId(recordId, sectionId) {
  const h = ((recordId * 2654435761) ^ (sectionId.charCodeAt(0) * 40503)) >>> 0;
  return h.toString(16).padStart(8, '0').slice(0, 8);
}

function fmtTs(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
       + ' · ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function fmtDuration(val) {
  if (val == null) return '—';
  return `${val} min`;
}


/* Dynamic components */
const VIRTUAL_COLS = ['__notes__'];

function DynamicTable({ records, search, hiddenCols, setHiddenCols, tableName }) {
  const [sortCol, setSortCol]           = useState(null);
  const [sortAsc, setSortAsc]           = useState(true);
  const [colNames, setColNames]         = useState(() => {
    try { return JSON.parse(localStorage.getItem('colNames') || '{}'); } catch { return {}; }
  });
  const [editingCol, setEditingCol]     = useState(null);
  const [editVal, setEditVal]           = useState('');
  const [colFilters, setColFilters]     = useState({});
  const [openFilter, setOpenFilter]     = useState(null);
  const [filterSearch, setFilterSearch] = useState('');
  const resizeState = useRef({ col: null, startX: 0, startW: 0 });
  const [colWidths, setColWidths]       = useState({});
  const [notes, setNotes] = useState({});

  useEffect(() => {
    if (!tableName) return;
    try { setNotes(JSON.parse(localStorage.getItem(`notes:${tableName}`) || '{}')); } catch { setNotes({}); }
  }, [tableName]);

  const columns = useMemo(() => records.length > 0 ? [...Object.keys(records[0]), ...VIRTUAL_COLS] : [], [records]);

  useEffect(() => {
    function onDown(e) {
      if (!e.target.closest('.filter-dropdown') && !e.target.closest('.col-filter-btn'))
        { setOpenFilter(null); setFilterSearch(''); }
    }
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);

  useEffect(() => {
    function onMove(e) {
      if (!resizeState.current.col) return;
      const newW = Math.max(60, resizeState.current.startW + (e.clientX - resizeState.current.startX));
      setColWidths(prev => ({ ...prev, [resizeState.current.col]: newW }));
    }
    function onUp() { resizeState.current.col = null; }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    return () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  }, []);

  function getUniqueVals(col) {
    const s = new Set();
    records.forEach(r => s.add(String(r[col] ?? '')));
    return [...s].sort();
  }

  function toggleColFilter(col, val) {
    setColFilters(prev => {
      const allVals = getUniqueVals(col);
      const cur = prev[col] ? new Set(prev[col]) : new Set(allVals);
      if (cur.has(val)) cur.delete(val); else cur.add(val);
      const n = { ...prev };
      if (cur.size >= allVals.length) delete n[col]; else n[col] = cur;
      return n;
    });
  }

  function showOnlyVal(col, val) {
    setColFilters(prev => ({ ...prev, [col]: new Set([val]) }));
  }

  // Prune stale filter values when records change (the include-set may
  // reference values that no longer exist after a reload).
  useEffect(() => {
    setColFilters(prev => {
      let changed = false;
      const next = {};
      Object.entries(prev).forEach(([col, vals]) => {
        if (!vals) return;
        const live = getUniqueVals(col);
        const pruned = new Set([...vals].filter(v => live.includes(v)));
        if (pruned.size === 0) { changed = true; return; }
        if (pruned.size >= live.length) { changed = true; return; }
        if (pruned.size !== vals.size) changed = true;
        next[col] = pruned;
      });
      return changed ? next : prev;
    });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [records]);

  const filtered = useMemo(() => {
    let rows = records;
    if (search.trim()) {
      const q = search.toLowerCase();
      rows = rows.filter(r => Object.values(r).some(v => v != null && String(v).toLowerCase().includes(q)));
    }
    Object.entries(colFilters).forEach(([col, vals]) => {
      if (!vals || vals.size === 0) return;
      rows = rows.filter(r => vals.has(String(r[col] ?? '')));
    });
    return rows;
  }, [records, search, colFilters]);

  const sorted = useMemo(() => {
    if (!sortCol) return filtered;
    return [...filtered].sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      if (av == null && bv == null) return 0;
      if (av == null) return 1; if (bv == null) return -1;
      const cmp = typeof av === 'number' && typeof bv === 'number' ? av - bv : String(av).localeCompare(String(bv));
      return sortAsc ? cmp : -cmp;
    });
  }, [filtered, sortCol, sortAsc]);

  function handleSort(col) {
    if (sortCol === col) setSortAsc(a => !a);
    else { setSortCol(col); setSortAsc(true); }
  }

  function saveColName(col, val) {
    const trimmed = val.trim();
    const updated = { ...colNames };
    if (trimmed) updated[col] = trimmed; else delete updated[col];
    setColNames(updated);
    localStorage.setItem('colNames', JSON.stringify(updated));
    setEditingCol(null);
  }

  function Th({ col }) {
    if (hiddenCols.has(col)) return null;
    if (col === '__notes__') return <th style={{minWidth:'180px', cursor:'default'}}>Notes</th>;
    const active = sortCol === col;
    const hasFilter = colFilters[col] && colFilters[col].size > 0;
    const label = colNames[col] || col.replace(/_/g, ' ');
    const width = colWidths[col];
    const uniqueVals = openFilter === col ? getUniqueVals(col) : [];
    const shownVals = filterSearch ? uniqueVals.filter(v => v.toLowerCase().includes(filterSearch.toLowerCase())) : uniqueVals;

    if (editingCol === col) return (
      <th style={{...(width?{width,minWidth:width}:{}), position:'relative'}}>
        <input autoFocus value={editVal}
          onChange={e => setEditVal(e.target.value)}
          onBlur={() => saveColName(col, editVal)}
          onKeyDown={e => { if (e.key === 'Enter') saveColName(col, editVal); if (e.key === 'Escape') setEditingCol(null); }}
          style={{width:'90px',fontSize:'12px',padding:'2px 4px',borderRadius:'3px',border:'1px solid #6366f1'}}
          onClick={e => e.stopPropagation()} />
        <div className="col-resize-handle" onMouseDown={e => { e.preventDefault(); e.stopPropagation(); resizeState.current = {col, startX:e.clientX, startW:width||e.currentTarget.closest('th').offsetWidth}; }} />
      </th>
    );

    return (
      <th className={active ? 'sort-active' : ''} onClick={() => handleSort(col)}
        style={{position:'relative', cursor:'pointer', whiteSpace:'nowrap', ...(width?{width,minWidth:width}:{})}}>
        <span style={{display:'inline-flex', alignItems:'center', gap:'3px'}}>
          {label}
          <span className={`col-filter-btn${hasFilter ? ' col-filter-active' : ''}`}
            onClick={e => { e.stopPropagation(); setOpenFilter(openFilter===col?null:col); setFilterSearch(''); }}
            title="Filter">▼</span>
          <span className="col-edit-btn"
            onClick={e => { e.stopPropagation(); setEditingCol(col); setEditVal(colNames[col]||col.replace(/_/g,' ')); }}
            title="Rename" style={{opacity:0,fontSize:'11px',cursor:'pointer',color:'#6366f1',transition:'opacity 0.15s'}}>✏</span>
        </span>
        &nbsp;{active ? (sortAsc ? '↑' : '↓') : <span style={{opacity:0.35}}>↕</span>}
        {openFilter === col && (
          <div className="filter-dropdown" onClick={e => e.stopPropagation()}>
            <div className="filter-dropdown-search">
              <input autoFocus placeholder="Search…" value={filterSearch} onChange={e => setFilterSearch(e.target.value)} />
            </div>
            <div className="filter-dropdown-list">
              <label className="filter-dropdown-item">
                <input type="checkbox" checked={!colFilters[col]||colFilters[col].size===0}
                  onChange={() => { const n={...colFilters}; delete n[col]; setColFilters(n); }} />
                <strong>(Select All)</strong>
              </label>
              {shownVals.map(v => (
                <label key={v} className="filter-dropdown-item">
                  <input type="checkbox"
                    checked={!colFilters[col]||colFilters[col].size===0||colFilters[col].has(v)}
                    onChange={() => toggleColFilter(col, v)} />
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'110px',flex:1}} title={v}>{v||'(blank)'}</span>
                  <span
                    onClick={e => { e.preventDefault(); e.stopPropagation(); showOnlyVal(col, v); }}
                    style={{fontSize:'10px',color:'#6366f1',cursor:'pointer',marginLeft:'4px',whiteSpace:'nowrap'}}
                    title="Show only this value">only</span>
                </label>
              ))}
            </div>
            <div className="filter-dropdown-actions">
              <button onClick={() => { const n={...colFilters}; delete n[col]; setColFilters(n); }}>Clear Filter</button>
            </div>
          </div>
        )}
        <div className="col-resize-handle"
          onMouseDown={e => { e.preventDefault(); e.stopPropagation(); resizeState.current = {col, startX:e.clientX, startW:width||e.currentTarget.closest('th').offsetWidth}; }} />
      </th>
    );
  }

  const activeFilterCount = Object.values(colFilters).filter(s => s && s.size > 0).length;
  const visibleCols = columns.filter(c => !hiddenCols.has(c));

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
      {activeFilterCount > 0 && (
        <div className="excel-toolbar">
          <span>{sorted.length} of {records.length} rows</span>
          <span className="excel-chip" style={{background:'#eef2ff',color:'#4f46e5'}}>
            {activeFilterCount} filter{activeFilterCount>1?'s':''} active
            <span onClick={() => setColFilters({})}>✕</span>
          </span>
        </div>
      )}
      {sorted.length === 0 ? (
        <div className="state-center">
          <div className="state-icon">🔎</div>
          <div className="state-msg">No rows match your filters</div>
        </div>
      ) : (
        <table className="runs-table">
          <thead><tr>{columns.map(col => <Th key={col} col={col} />)}</tr></thead>
          <tbody>
            {sorted.map((rec, i) => {
              const rowId = rec.id != null ? String(rec.id) : String(i);
              return (
                <tr key={rowId}>
                  {visibleCols.map(col => {
                    if (col === '__notes__') return (
                      <td key="__notes__" style={{maxWidth:'none', overflow:'visible', whiteSpace:'normal'}}>
                        <textarea
                          className="notes-cell"
                          rows={1}
                          placeholder="Add note…"
                          value={notes[rowId] || ''}
                          onChange={e => {
                            const val = e.target.value;
                            setNotes(prev => {
                              const updated = { ...prev, [rowId]: val };
                              localStorage.setItem(`notes:${tableName}`, JSON.stringify(updated));
                              return updated;
                            });
                          }}
                          onFocus={e => { e.target.rows = 3; }}
                          onBlur={e => { e.target.rows = 1; }}
                          onClick={e => e.stopPropagation()}
                        />
                      </td>
                    );
                    return (
                      <td key={col} style={{maxWidth:'240px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                        title={rec[col] != null ? String(rec[col]) : ''}>
                        {rec[col] != null ? String(rec[col]) : <span className="cell-muted">—</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

/* ─── New Product Dashboard ───────────────────────────────── */

function fmtAgo(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  const mins = Math.floor((Date.now() - d.getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 48) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function fmtNum(v, opts = {}) {
  if (v == null) return '—';
  const { unit, decimals = 1, locale = true } = opts;
  let s = locale ? Number(v).toLocaleString(undefined, { maximumFractionDigits: decimals }) : Number(v).toFixed(decimals);
  return unit ? <>{s}<span className="tile-unit">{unit}</span></> : s;
}

function Tile({ label, value, unit, sub, meta, isStale, isUnavailable, blocker, onClick, decimals = 1, large = false, locale = true, sourceHref }) {
  const cls = [
    'tile',
    large ? 'ns-tile' : '',
    isUnavailable ? 'tile-unavailable' : '',
    isStale ? 'tile-stale' : '',
  ].filter(Boolean).join(' ');

  const displayValue = isUnavailable
    ? '—'
    : (value == null
        ? '—'
        : (locale
            ? Number(value).toLocaleString(undefined, { maximumFractionDigits: decimals })
            : Number(value).toFixed(decimals)));

  return (
    <div className={cls} onClick={isUnavailable ? undefined : onClick}>
      {sourceHref && !isUnavailable && (
        <a className="tile-link" href={sourceHref} target="_blank" rel="noreferrer"
           onClick={e => e.stopPropagation()} title="View source on GitHub">↗</a>
      )}
      <div className="tile-label">{label}</div>
      <div>
        <span className="tile-value">{displayValue}</span>
        {unit && !isUnavailable && <span className="tile-unit">{unit}</span>}
      </div>
      {sub && !isUnavailable && <div className="tile-sub">{sub}</div>}
      {blocker && isUnavailable && <div className="tile-blocker">{blocker}</div>}
      {!isUnavailable && (isStale || meta) && (
        <div className="tile-meta">
          {isStale && <span className="tile-stale-pill">stale</span>}
          {isStale && meta && <span>·</span>}
          {meta && <span>{meta}</span>}
        </div>
      )}
      {isUnavailable && (
        <div className="tile-meta">
          <span className="tile-placeholder-pill">placeholder</span>
        </div>
      )}
    </div>
  );
}

function Section({ num, title, hint, children, link, linkLabel }) {
  return (
    <div className="dash-section">
      <div className="dash-section-head">
        {num != null && <span className="dash-section-num">{num}</span>}
        <span className="dash-section-title">{title}</span>
        {link && (
          <a className="dash-section-link" href={link} target="_blank" rel="noreferrer">
            {linkLabel || 'View on GitHub'}
          </a>
        )}
        {hint && <span className="dash-section-hint">{hint}</span>}
      </div>
      {children}
    </div>
  );
}

function IssueListModal({ title, slice, onClose }) {
  const [items, setItems] = useState(null);
  const [err, setErr] = useState(null);

  useEffect(() => {
    fetch(API_BASE + '/api/dashboard/issues/' + slice)
      .then(r => r.json())
      .then(d => { if (d.available) setItems(d.items); else setErr(d.note || 'No data'); })
      .catch(e => setErr(String(e)));
  }, [slice]);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {err && <div className="issue-empty">{err}</div>}
          {!err && !items && <div className="issue-empty"><div className="spinner" /></div>}
          {items && items.length === 0 && <div className="issue-empty">No issues in this slice.</div>}
          {items && items.length > 0 && (
            <ul className="issue-list">
              {items.map(i => (
                <li key={i.number} className="issue-item">
                  <span className="issue-num">#{i.number}</span>
                  <div style={{flex: 1}}>
                    <div className="issue-title-text">
                      <a href={i.url} target="_blank" rel="noreferrer">{i.title}</a>
                    </div>
                    <div className="issue-meta">
                      <span className={'issue-state-' + i.state}>{i.state}</span>
                      {i.labels.length > 0 && <span>{i.labels.join(' · ')}</span>}
                      {i.assignees.length > 0 && <span>→ {i.assignees.join(', ')}</span>}
                      {i.closed_at && <span>closed {fmtAgo(i.closed_at)}</span>}
                    </div>
                  </div>
                </li>
              ))}
            </ul>
          )}
        </div>
      </div>
    </div>
  );
}

function TileDetailModal({ title, tableName, aggregate, datasetId, onClose }) {
  const [rows, setRows] = useState(null);
  const [err, setErr] = useState(null);
  const [search, setSearch] = useState('');
  const [hiddenCols, setHiddenCols] = useState(new Set());

  useEffect(() => {
    if (!tableName) { setRows([]); return; }
    const url = API_BASE + '/api/table/' + tableName + (datasetId != null ? '?dataset_id=' + datasetId : '');
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('Fetch failed (' + r.status + ')'); return r.json(); })
      .then(d => setRows(Array.isArray(d) ? d.slice().reverse() : []))
      .catch(e => setErr(String(e.message || e)));
  }, [tableName, datasetId]);

  const columns = useMemo(() => rows && rows.length > 0 ? Object.keys(rows[0]) : [], [rows]);
  const visibleCols = columns.filter(c => !hiddenCols.has(c));
  const filteredRows = !search.trim() ? (rows || [])
    : rows.filter(r => Object.values(r).some(v => v != null && String(v).toLowerCase().includes(search.toLowerCase())));

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {aggregate && aggregate.length > 0 && (
          <div className="modal-aggregate">
            {aggregate.map(([k, v]) => (
              <div key={k} className="agg-pair"><span className="agg-key">{k}</span><span className="agg-val">{v}</span></div>
            ))}
          </div>
        )}
        {columns.length > 0 && (
          <div className="modal-controls">
            <input className="search-input" style={{maxWidth: 240}} placeholder="Search rows…" value={search} onChange={e => setSearch(e.target.value)} />
            <div className="modal-col-toggle">
              {columns.map(c => (
                <label key={c} title={c}>
                  <input type="checkbox" checked={!hiddenCols.has(c)}
                    onChange={() => setHiddenCols(prev => { const s = new Set(prev); if (s.has(c)) s.delete(c); else s.add(c); return s; })} />
                  {c.replace(/_/g, ' ')}
                </label>
              ))}
            </div>
          </div>
        )}
        <div className="modal-body">
          {err && <div className="issue-empty">Could not load underlying rows: {err}</div>}
          {!err && rows == null && <div className="issue-empty"><div className="spinner" /></div>}
          {!err && rows != null && rows.length === 0 && (
            <div className="issue-empty">No underlying rows{tableName ? ` in ${tableName}` : ''} yet.</div>
          )}
          {!err && rows != null && rows.length > 0 && (
            <table className="detail-table">
              <thead><tr>{visibleCols.map(c => <th key={c}>{c.replace(/_/g, ' ')}</th>)}</tr></thead>
              <tbody>
                {filteredRows.map((r, i) => (
                  <tr key={r.id ?? i}>
                    {visibleCols.map(c => {
                      const v = r[c];
                      return (
                        <td key={c} title={v != null ? String(v) : ''}>
                          {v == null ? <span style={{color: '#cbd5e1'}}>—</span>
                            : typeof v === 'boolean' ? (v ? '✓' : '✗')
                            : typeof v === 'number' && Number.isInteger(v) ? v.toLocaleString()
                            : typeof v === 'number' ? v.toFixed(2)
                            : String(v)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {filteredRows.length === 0 && (
                  <tr><td colSpan={visibleCols.length} style={{textAlign: 'center', padding: 30, color: '#94a3b8'}}>No rows match your filter.</td></tr>
                )}
              </tbody>
            </table>
          )}
        </div>
        <div className="modal-footer">
          {rows ? `Showing ${filteredRows.length} of ${rows.length} rows` : 'Loading…'} · Press Esc to close
        </div>
      </div>
    </div>
  );
}

function KPIDashboard() {
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [tab, setTab]         = useState('build');
  const [modal, setModal]     = useState(null);          // issue-list drill-down
  const [detailModal, setDetailModal] = useState(null);  // tile-detail drill-down

  const reload = useCallback(() => {
    setLoading(true);
    fetch(API_BASE + '/api/dashboard')
      .then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); })
      .then(d => { setData(d); setLoading(false); setError(null); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  useEffect(() => { reload(); }, [reload]);

  useEffect(() => {
    function onEsc(e) { if (e.key === 'Escape') { setModal(null); setDetailModal(null); } }
    document.addEventListener('keydown', onEsc);
    return () => document.removeEventListener('keydown', onEsc);
  }, []);

  if (loading && !data) return <div className="state-center"><div className="spinner" /><div className="state-msg">Loading dashboard…</div></div>;
  if (error || !data) return <div className="state-center"><div className="state-icon">⚠️</div><div className="state-msg">{error || 'Could not load dashboard'}</div><button className="refresh-btn" style={{marginTop:12}} onClick={reload}>Retry</button></div>;

  const sprint = data.sprint;
  const build = data.build;
  const gtm = data.gtm;
  const velocity = build.build_velocity;
  const readiness = build.product_readiness;
  const pq = build.product_quality;
  const ph = pq.pipeline_health || {};

  const sprintDayCount = Math.max(1, Math.floor((Date.parse(sprint.end_iso) - Date.parse(sprint.start_iso)) / (24*3600*1000)));
  const sprintElapsedDays = Math.max(0, Math.min(sprintDayCount, Math.floor((Date.now() - Date.parse(sprint.start_iso)) / (24*3600*1000))));
  const sprintProgressPct = Math.round((sprintElapsedDays / sprintDayCount) * 100);
  const fmtDateShort = (iso) => new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  const openDetail = (key, tile) => {
    const recipes = {
      tts: () => ({ title: 'Time to Solution — per-solution timing', tableName: null,
        aggregate: [['Avg TTS', `${tile.value} ${tile.unit}`], ['Median', tile.p50_min != null ? `${tile.p50_min} min` : '—'],
                    ['n solutions', tile.n_solutions], ['Source', tile.source]] }),
      solutions_accuracy: () => ({ title: 'Solutions Accuracy — portal UI test sessions', tableName: 'portal_ui_test_session',
        aggregate: [['Current accuracy', `${tile.value}%`], ['Sessions counted', tile.n_sessions], ['Last session', fmtAgo(tile.last_session_at) || '—'], ['Source', tile.source]] }),
      answer_latency_p95: () => ({ title: 'Answer Latency p95 — production query telemetry', tableName: 'query_latency',
        aggregate: [['Current p95', `${tile.value} ms`], ['n queries', tile.n_queries.toLocaleString()], ['Last query', fmtAgo(tile.last_query_at) || '—'], ['Source', tile.source]] }),
      retrieval_latency_p95: () => ({ title: 'Retrieval Latency p95 — benchmark runs', tableName: 'benchmark_retrieval_results',
        aggregate: [['Current p95', `${tile.value} ms`], ['Datasets', tile.n_datasets ?? '—'], ['Last measured', fmtAgo(tile.last_measured_at) || '—'], ['Source', tile.source]] }),
      index_build_time: () => ({ title: 'Index Build Time — batch runs', tableName: 'indexing',
        aggregate: [...Object.entries(tile.by_engine || {}).map(([k, v]) => [k, `${v.value} min/1M`]), ['Last run', fmtAgo(tile.last_run_at) || '—'], ['Source', tile.source]] }),
      crawling_speed: () => ({ title: 'Crawling — pages per run', tableName: 'crawling',
        aggregate: [['Avg speed', `${tile.value} ${tile.unit}`], ['Total pages', tile.total_pages?.toLocaleString()], ['Runs', tile.n_runs], ['Source', tile.source]] }),
      extraction_success: () => ({ title: 'Extraction Pipeline — per-run success', tableName: 'extraction_pipeline',
        aggregate: [['Avg success rate', `${tile.value}%`], ['Runs', tile.n_runs], ['Avg time', `${tile.avg_time_min} min`], ['Source', tile.source]] }),
      chunking_volume: () => ({ title: 'Chunking — runs and volume', tableName: 'chunking',
        aggregate: [['Total chunks', tile.value?.toLocaleString()], ['Avg chunk size', `${tile.avg_chunk_size} tokens`], ['Runs', tile.n_runs], ['Source', tile.source]] }),
      metadata_accuracy: () => ({ title: 'Metadata Generation — quality per run', tableName: 'metadata_generation',
        aggregate: [['Avg accuracy', `${tile.value}%`], ['Fields generated', tile.fields_generated?.toLocaleString()], ['Runs', tile.n_runs], ['Source', tile.source]] }),
      rag_throughput: () => ({ title: 'RAG Pipeline — throughput and accuracy', tableName: 'rag_pipeline',
        aggregate: [['Avg throughput', `${tile.value} ${tile.unit}`], ['Queries served', tile.total_queries?.toLocaleString()], ['Runs', tile.n_runs], ['Source', tile.source]] }),
      data_ingested: () => ({ title: 'Data Sources — connected and ingested', tableName: 'data_source',
        aggregate: [['Total', `${tile.value} ${tile.unit}`], ['Sources', tile.n_sources], ['Last add', fmtAgo(tile.last_added_at) || '—'], ['Source', tile.source]] }),
      experiment_runs: () => ({ title: 'Experiment Runs — tagged accuracy / latency / index / ingest', tableName: 'experiment_run',
        aggregate: [['Total runs', tile.value], ['Accuracy', tile.accuracy_runs], ['Latency', tile.latency_runs], ['Ingest', tile.ingest_runs], ['Index', tile.index_runs], ['Source', tile.source]] }),
      website_ui_pass: () => ({ title: 'Website UI Tests — Playwright sessions', tableName: 'website_ui_test_run',
        aggregate: [['Pass rate', `${tile.value}%`], ['Sessions', tile.n_sessions], ['Last run', fmtAgo(tile.last_run_at) || '—'], ['Source', tile.source]] }),
    };
    const recipe = recipes[key];
    if (recipe) setDetailModal(recipe());
  };

  const PH_TILE = (key, tile, label, opts = {}) => {
    if (!tile) return null;
    return (
      <Tile
        label={label}
        value={tile.value}
        unit={tile.unit ?? opts.unit}
        decimals={opts.decimals ?? 1}
        sub={opts.sub}
        meta={opts.lastAt && tile[opts.lastAt] && `last ${fmtAgo(tile[opts.lastAt])}`}
        isStale={tile.is_stale}
        isUnavailable={!tile.available}
        blocker={tile.note}
        onClick={() => openDetail(key, tile)}
      />
    );
  };

  return (
    <div>
      <div className="dash-tabs">
        <div className={'dash-tab' + (tab === 'build' ? ' active' : '')} onClick={() => setTab('build')}>
          <span className="dash-tab-icon">⚙</span>Build KPIs
        </div>
        <div className={'dash-tab' + (tab === 'gtm' ? ' active' : '')} onClick={() => setTab('gtm')}>
          <span className="dash-tab-icon">🎯</span>GTM KPIs
        </div>
      </div>

      <div className="dash-sprint-bar">
        <div className="sprint-badge">
          <div className="sprint-badge-row">
            <span className="sprint-badge-num">Sprint {sprint.number ?? '—'}</span>
            <span className="sprint-badge-dates">{fmtDateShort(sprint.start_iso)} → {fmtDateShort(sprint.end_iso)}</span>
          </div>
          <div className="sprint-badge-progress"><div className="sprint-badge-progress-fill" style={{width: sprintProgressPct + '%'}} /></div>
          <div className="sprint-badge-progress-label">Day {sprintElapsedDays} of {sprintDayCount} · {sprintProgressPct}% elapsed</div>
        </div>
        {velocity.available && (
          <div className="sprint-stats">
            <span className="dash-sprint-stat" onClick={() => setModal({title: 'Engineering — Sprint issues', slice: 'engineering'})}>
              Engineering <strong>{velocity.engineering.done}/{velocity.engineering.total}</strong>
              <span className="pct">{velocity.engineering.pct != null ? velocity.engineering.pct.toFixed(0) + '%' : '—'}</span>
            </span>
            <span className="dash-sprint-stat" onClick={() => setModal({title: 'Product & GTM — Sprint issues', slice: 'product_gtm'})}>
              Product / GTM <strong>{velocity.product_gtm.done}/{velocity.product_gtm.total}</strong>
              <span className="pct">{velocity.product_gtm.pct != null ? velocity.product_gtm.pct.toFixed(0) + '%' : '—'}</span>
            </span>
            <span className="dash-sprint-stat" onClick={() => setModal({title: 'Open bugs', slice: 'bugs_open'})} style={{borderColor: '#fecaca'}}>
              Open bugs <strong>{velocity.bugs.open}</strong>
              <span className="pct" style={{color: '#dc2626'}}>{velocity.bugs.fixed_this_sprint} fixed</span>
            </span>
          </div>
        )}
        {!velocity.available && (
          <span style={{color: '#94a3b8'}}>Velocity unavailable — {velocity.note}</span>
        )}
        <span className="dash-sprint-refreshed">
          <span>{loading ? 'Refreshing…' : `Updated ${fmtAgo(data.computed_at)}`}</span>
          <a href="#" onClick={e => { e.preventDefault(); if (!loading) reload(); }}
             style={loading ? {opacity: 0.5, pointerEvents: 'none'} : {}}>
            {loading ? '⟳' : '↻ refresh'}
          </a>
        </span>
      </div>

      <div className="kpi-page">
        {tab === 'build' && (
          <>
            <Section num="01" title="North Star" hint="Composite — accuracy, latency, index build time">
              <div className="tile-grid">
                <Tile
                  label="Time to Solution (TTS)"
                  value={build.north_star.tts.value}
                  unit={build.north_star.tts.unit}
                  sub={build.north_star.tts.p50_min != null ? `Median ${build.north_star.tts.p50_min} min · across ${build.north_star.tts.n_solutions} solutions` : null}
                  meta={build.north_star.tts.last_first_query_at && `last query ${fmtAgo(build.north_star.tts.last_first_query_at)}`}
                  isStale={build.north_star.tts.is_stale}
                  isUnavailable={!build.north_star.tts.available}
                  blocker={build.north_star.tts.note}
                  large
                  onClick={() => openDetail('tts', build.north_star.tts)}
                />
              </div>
            </Section>

            <Section num="02" title="Product Quality" hint="Click any tile for underlying rows">
              <div className="quality-subhead">Answer quality & latency</div>
              <div className="tile-grid">
                <Tile
                  label="Solutions Accuracy (avg)"
                  value={pq.solutions_accuracy.value}
                  unit="%"
                  sub={`${pq.solutions_accuracy.n_sessions} sessions · ≥10 questions each`}
                  meta={pq.solutions_accuracy.last_session_at && `last ${fmtAgo(pq.solutions_accuracy.last_session_at)}`}
                  isStale={pq.solutions_accuracy.is_stale}
                  isUnavailable={!pq.solutions_accuracy.available}
                  blocker={pq.solutions_accuracy.note}
                  onClick={() => openDetail('solutions_accuracy', pq.solutions_accuracy)}
                />
                <Tile
                  label="Answer Latency p95"
                  value={pq.answer_latency_p95.value}
                  unit="ms"
                  decimals={0}
                  sub={`${(pq.answer_latency_p95.n_queries || 0).toLocaleString()} production queries`}
                  meta={pq.answer_latency_p95.last_query_at && `last ${fmtAgo(pq.answer_latency_p95.last_query_at)}`}
                  isStale={pq.answer_latency_p95.is_stale}
                  isUnavailable={!pq.answer_latency_p95.available}
                  blocker={pq.answer_latency_p95.note}
                  onClick={() => openDetail('answer_latency_p95', pq.answer_latency_p95)}
                />
                <Tile
                  label="Retrieval Latency p95"
                  value={pq.retrieval_latency_p95.value}
                  unit="ms"
                  sub={pq.retrieval_latency_p95.n_datasets != null ? `Qdrant dense · ${pq.retrieval_latency_p95.n_datasets} datasets` : null}
                  meta={pq.retrieval_latency_p95.last_measured_at && `last ${fmtAgo(pq.retrieval_latency_p95.last_measured_at)}`}
                  isStale={pq.retrieval_latency_p95.is_stale}
                  isUnavailable={!pq.retrieval_latency_p95.available}
                  blocker={pq.retrieval_latency_p95.note}
                  onClick={() => openDetail('retrieval_latency_p95', pq.retrieval_latency_p95)}
                />
                <Tile
                  label="Index Build Time"
                  value={pq.index_build_time.by_engine?.Qdrant?.value}
                  unit="min/1M"
                  sub={Object.entries(pq.index_build_time.by_engine || {}).map(([k, v]) => `${k} ${v.value}`).join(' · ')}
                  meta={pq.index_build_time.last_run_at && `last ${fmtAgo(pq.index_build_time.last_run_at)}`}
                  isStale={pq.index_build_time.is_stale}
                  isUnavailable={!pq.index_build_time.available}
                  blocker={pq.index_build_time.note}
                  onClick={() => openDetail('index_build_time', pq.index_build_time)}
                />
              </div>

              {Object.keys(ph).length > 0 && (<>
                <div className="quality-subhead" style={{marginTop: 22}}>Pipeline health · all leaderboard data sources</div>
                <div className="tile-grid">
                  {PH_TILE('crawling_speed', ph.crawling_speed, 'Crawling Speed', {decimals: 0, sub: ph.crawling_speed && `${(ph.crawling_speed.total_pages || 0).toLocaleString()} total pages · ${ph.crawling_speed.n_runs} runs`, lastAt: 'last_run_at'})}
                  {PH_TILE('extraction_success', ph.extraction_success, 'Extraction Success', {sub: ph.extraction_success && `${ph.extraction_success.n_runs} runs · avg ${ph.extraction_success.avg_time_min}m each`, lastAt: 'last_run_at'})}
                  {PH_TILE('chunking_volume', ph.chunking_volume, 'Chunks Generated', {decimals: 0, sub: ph.chunking_volume && `avg ${ph.chunking_volume.avg_chunk_size} tokens · ${ph.chunking_volume.n_runs} runs`, lastAt: 'last_run_at'})}
                  {PH_TILE('metadata_accuracy', ph.metadata_accuracy, 'Metadata Accuracy', {sub: ph.metadata_accuracy && `${(ph.metadata_accuracy.fields_generated || 0).toLocaleString()} fields · ${ph.metadata_accuracy.n_runs} runs`, lastAt: 'last_run_at'})}
                  {PH_TILE('rag_throughput', ph.rag_throughput, 'RAG Throughput', {sub: ph.rag_throughput && `${(ph.rag_throughput.total_queries || 0).toLocaleString()} queries · ${ph.rag_throughput.n_runs} runs`, lastAt: 'last_run_at'})}
                  {PH_TILE('data_ingested', ph.data_ingested, 'Data Ingested', {sub: ph.data_ingested && `${ph.data_ingested.n_sources} sources connected`, lastAt: 'last_added_at'})}
                  {PH_TILE('experiment_runs', ph.experiment_runs, 'Experiment Runs', {decimals: 0, sub: ph.experiment_runs && `${ph.experiment_runs.accuracy_runs} acc · ${ph.experiment_runs.latency_runs} lat · ${ph.experiment_runs.ingest_runs} ingest · ${ph.experiment_runs.index_runs} index`, lastAt: 'last_run_at'})}
                  {PH_TILE('website_ui_pass', ph.website_ui_pass, 'Website UI Pass Rate', {sub: ph.website_ui_pass && `${ph.website_ui_pass.n_sessions} Playwright sessions`, lastAt: 'last_run_at'})}
                </div>
              </>)}

              <div className="quality-subhead" style={{marginTop: 22}}>RAG Accuracy Delta vs HF Leaderboard <span className="delta-meta">— vs best frontier LLM, no-RAG baseline</span></div>
              <table className="kpi-delta-table">
                <thead><tr>
                  <th>Dataset</th><th>Kurious</th><th>Best Frontier LLM</th><th>Delta</th>
                </tr></thead>
                <tbody>
                  {pq.rag_accuracy_delta.rows.map(row => (
                    <tr key={row.dataset}>
                      <td>{row.dataset}</td>
                      <td>{row.kurious_pct.toFixed(1)}%</td>
                      <td>{row.best_llm_pct.toFixed(1)}%</td>
                      <td className={row.delta_pct >= 0 ? 'delta-pos' : 'delta-neg'}>
                        {row.delta_pct >= 0 ? '+' : ''}{row.delta_pct.toFixed(1)}%
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="kpi-source-note">
                {pq.rag_accuracy_delta.source} · {pq.rag_accuracy_delta.note}
              </div>
            </Section>

            <Section num="03" title="Build Velocity"
                     link={velocity.source ? `https://${velocity.source}/issues?q=is:issue+updated:>=${sprint.start_iso.slice(0,10)}` : null}
                     linkLabel="GitHub issues"
                     hint={`${fmtDateShort(sprint.start_iso)} → ${fmtDateShort(sprint.end_iso)} · resets every Friday 9pm PT`}>
              {!velocity.available && <div className="tile-blocker" style={{borderTop: 'none', marginTop: 0, padding: 0}}>{velocity.note}</div>}
              {velocity.available && (
                <div className="tile-grid">
                  <Tile
                    label="Engineering Completion"
                    value={velocity.engineering.pct}
                    unit="%"
                    sub={`${velocity.engineering.done} done · ${velocity.engineering.open} open · ${velocity.engineering.total} total`}
                    meta="sprint"
                    sourceHref={`https://${velocity.source}/issues?q=is:issue+label:engineering+is:closed+closed:>=${sprint.start_iso.slice(0,10)}`}
                    onClick={() => setModal({title: 'Engineering — Sprint issues', slice: 'engineering'})}
                  />
                  <Tile
                    label="Product / GTM Completion"
                    value={velocity.product_gtm.pct}
                    unit="%"
                    sub={`${velocity.product_gtm.done} done · ${velocity.product_gtm.open} open · ${velocity.product_gtm.total} total`}
                    meta="sprint"
                    sourceHref={`https://${velocity.source}/issues?q=is:issue+label:product+is:closed+closed:>=${sprint.start_iso.slice(0,10)}`}
                    onClick={() => setModal({title: 'Product & GTM — Sprint issues', slice: 'product_gtm'})}
                  />
                  <Tile
                    label="Bugs Open"
                    value={velocity.bugs.open}
                    decimals={0}
                    sub={`${velocity.bugs.fixed_this_sprint} fixed this sprint`}
                    meta="across all severities"
                    sourceHref={`https://${velocity.source}/issues?q=is:issue+is:open+label:bug`}
                    onClick={() => setModal({title: 'Open bugs', slice: 'bugs_open'})}
                  />
                  <Tile
                    label="Avg Time to Fix Bugs"
                    value={velocity.bugs.avg_time_to_fix_hours}
                    unit="h"
                    sub={velocity.bugs.median_time_to_fix_hours != null ? `median ${velocity.bugs.median_time_to_fix_hours}h · sprint` : 'no closures this sprint'}
                    meta="sprint"
                    isUnavailable={velocity.bugs.avg_time_to_fix_hours == null}
                    blocker="No bugs closed within current sprint window"
                    sourceHref={`https://${velocity.source}/issues?q=is:issue+label:bug+is:closed+closed:>=${sprint.start_iso.slice(0,10)}`}
                    onClick={() => setModal({title: 'Bugs fixed this sprint', slice: 'bugs_fixed'})}
                  />
                </div>
              )}
            </Section>

            <Section num="04" title="Product Readiness"
                     link={readiness.source ? `https://${readiness.source}/issues?q=is:issue+is:closed+closed:>=${sprint.start_iso.slice(0,10)}` : null}
                     linkLabel="Publications repo"
                     hint="Closed this sprint · click for the issue list">
              {!readiness.available && <div className="tile-blocker" style={{borderTop: 'none', marginTop: 0, padding: 0}}>{readiness.note}</div>}
              {readiness.available && (
                <div className="tile-grid">
                  <Tile
                    label="Paper Publications"
                    value={readiness.paper_publications.count}
                    decimals={0}
                    sub="Closed this sprint"
                    meta="aintropy-ai/publications"
                    sourceHref={`https://${readiness.source}/issues?q=is:issue+is:closed+-label:collateral+closed:>=${sprint.start_iso.slice(0,10)}`}
                    onClick={() => setModal({title: 'Paper Publications — Sprint', slice: 'papers'})}
                  />
                  <Tile
                    label="Collaterals"
                    value={readiness.collaterals.count}
                    decimals={0}
                    sub="Closed this sprint"
                    meta="label: collateral"
                    sourceHref={`https://${readiness.source}/issues?q=is:issue+is:closed+label:collateral+closed:>=${sprint.start_iso.slice(0,10)}`}
                    onClick={() => setModal({title: 'Collaterals — Sprint', slice: 'collaterals'})}
                  />
                </div>
              )}
            </Section>
          </>
        )}

        {tab === 'gtm' && (
          <>
            <div className="gtm-banner">
              <span className="gtm-banner-icon">!</span>
              <span><strong>GTM metrics ship in a follow-up.</strong> The tiles below are placeholders that fill in automatically once each data source is instrumented. Tracking in <a href="https://github.com/aintropy-ai/aintropy-engine-product/issues/918" target="_blank" rel="noreferrer">issue #918</a>.</span>
            </div>
            <Section num="01" title="North Star" hint="TTS across active solutions">
              <div className="tile-grid">
                <Tile
                  label="TTS · # Solutions"
                  value={gtm.north_star.tts_solutions.value}
                  isUnavailable={!gtm.north_star.tts_solutions.available}
                  blocker={gtm.north_star.tts_solutions.note}
                  large
                />
              </div>
            </Section>
            <Section num="02" title="GTM Quality">
              <div className="tile-grid">
                <Tile
                  label="Impressions (Play)"
                  value={gtm.gtm_quality.impressions_play.value}
                  isUnavailable={!gtm.gtm_quality.impressions_play.available}
                  blocker={gtm.gtm_quality.impressions_play.note}
                />
                <Tile
                  label="Organic Try"
                  value={gtm.gtm_quality.organic_try.value}
                  isUnavailable={!gtm.gtm_quality.organic_try.available}
                  blocker={gtm.gtm_quality.organic_try.note}
                />
                <Tile
                  label="Views / Citations on Materials"
                  value={gtm.gtm_quality.views_citations.value}
                  isUnavailable={!gtm.gtm_quality.views_citations.available}
                  blocker={gtm.gtm_quality.views_citations.note}
                />
              </div>
            </Section>
            <Section num="03" title="Growth">
              <div className="tile-grid">
                <Tile
                  label="# Leads"
                  value={gtm.growth.leads.value}
                  isUnavailable={!gtm.growth.leads.available}
                  blocker={gtm.growth.leads.note}
                />
              </div>
            </Section>
          </>
        )}
      </div>

      {modal && <IssueListModal title={modal.title} slice={modal.slice} onClose={() => setModal(null)} />}
      {detailModal && <TileDetailModal title={detailModal.title} tableName={detailModal.tableName} aggregate={detailModal.aggregate} onClose={() => setDetailModal(null)} />}
    </div>
  );
}

function Overview({ tables, rowCounts, onSelect }) {
  return (
    <div>
      <div style={{padding:'20px 24px 4px', fontSize:13, color:'#64748b'}}>
        Click a table to explore its data.
      </div>
      <div className="overview-grid">
        {tables.map(t => (
          <div key={t} className="ov-card" onClick={() => onSelect(t)}>
            <div className="ov-card-icon">⊞</div>
            <div className="ov-card-title">{t.replace(/_/g, ' ')}</div>
            <div className="ov-card-meta">
              {rowCounts[t] != null
                ? <span>{rowCounts[t]} row{rowCounts[t] !== 1 ? 's' : ''}</span>
                : <span style={{color:'#cbd5e1'}}>loading…</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [tables, setTables]           = useState([]);
  const [activeTable, setActiveTable] = useState('kpi');
  const [records, setRecords]         = useState([]);
  const [loading, setLoading]         = useState(false);
  const [search, setSearch]           = useState('');
  const [databases, setDatabases]     = useState([]);
  const [databaseId, setDatabaseId]   = useState(null);
  const [apiState, setApiState]       = useState('check');
  const [rowCounts, setRowCounts]     = useState({});
  const [foreignKeys, setForeignKeys] = useState([]);
  const [fkFilters, setFkFilters]     = useState({});
  const [fkValues, setFkValues]       = useState({});
  const [hiddenCols, setHiddenCols]   = useState(new Set());
  const [showColPanel, setShowColPanel] = useState(false);
  const autoHiddenAppliedRef = useRef(new Set());

  const tableColumns = useMemo(() => records.length > 0 ? [...Object.keys(records[0]), ...VIRTUAL_COLS] : [], [records]);

  // Auto-hide obviously-redundant columns once per table (e.g., dataset_name
  // when dataset_id FK is already present). User can re-show via the Columns
  // panel; we don't override their explicit choices on refresh.
  useEffect(() => {
    if (!records.length || !activeTable) return;
    if (autoHiddenAppliedRef.current.has(activeTable)) return;
    const sample = records[0];
    const auto = new Set();
    if ('dataset_id' in sample && 'dataset_name' in sample) auto.add('dataset_name');
    if (auto.size > 0) setHiddenCols(prev => new Set([...prev, ...auto]));
    autoHiddenAppliedRef.current.add(activeTable);
  }, [records, activeTable]);

  useEffect(() => {
    function onDown(e) {
      if (!e.target.closest('.cols-toggle-panel') && !e.target.closest('.cols-toggle-btn'))
        setShowColPanel(false);
    }
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);

  useEffect(() => {
    async function init() {
      try {
        const [tablesRes, dbRes] = await Promise.all([
          fetch(API_BASE + '/api/tables'),
          fetch(API_BASE + '/api/datasets'),
        ]);
        const tablesData = await tablesRes.json();
        const dbData = await dbRes.json();
        setTables(tablesData);
        setDatabases(dbData);
        const firstDbId = dbData.length > 0 ? dbData[0].dataset_id : null;
        if (firstDbId) setDatabaseId(firstDbId);
        setApiState('live');
        // Fetch row counts for overview
        const counts = {};
        await Promise.all(tablesData.map(async t => {
          try {
            const r = await fetch(API_BASE + '/api/table/' + t + (firstDbId ? '?dataset_id=' + firstDbId : ''));
            const d = await r.json();
            counts[t] = d.length;
          } catch { counts[t] = null; }
        }));
        setRowCounts(counts);
      } catch(e) {
        setApiState('mock');
      }
    }
    init();
  }, []);

  useEffect(() => {
    if (!activeTable || activeTable === 'overview' || activeTable === 'feedback' || databaseId == null) return;
    setSearch('');
    setFkFilters({});
    setFkValues({});
    setForeignKeys([]);
    setHiddenCols(new Set());
    autoHiddenAppliedRef.current.delete(activeTable);
    setShowColPanel(false);
    // Fetch FK metadata then populate FK value dropdowns
    fetch(API_BASE + '/api/table/' + activeTable + '/foreign-keys')
      .then(r => r.json())
      .then(async fks => {
        setForeignKeys(fks);
        const vals = {};
        await Promise.all(fks.map(async fk => {
          try {
            const r = await fetch(API_BASE + '/api/table/' + activeTable + '/fk-values/' + fk.column);
            vals[fk.column] = await r.json();
          } catch { vals[fk.column] = []; }
        }));
        setFkValues(vals);
      })
      .catch(() => {});
    loadData(activeTable, databaseId, {});
  }, [activeTable, databaseId]);

  // Keep the dataset selection valid for the active table: if the selected
  // dataset has no rows here, switch to one that does (no dead-end empty view).
  useEffect(() => {
    const present = fkValues['dataset_id'];
    if (present && present.length && databaseId != null && !present.includes(databaseId)) {
      setDatabaseId(present[0]);
    }
  }, [fkValues]);

  useEffect(() => {
    if (activeTable !== 'feedback') return;
    setSearch('');
    setHiddenCols(new Set());
    setLoading(true);
    setRecords([]);
    fetch(API_BASE + '/api/feedback')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { setRecords(data); setApiState('live'); })
      .catch(() => { setRecords([]); setApiState('mock'); })
      .finally(() => setLoading(false));
  }, [activeTable]);

async function loadFeedback() {
    setLoading(true);
    setRecords([]);
    try {
      const res = await fetch(API_BASE + '/api/feedback');
      if (!res.ok) throw new Error();
      setRecords(await res.json());
      setApiState('live');
    } catch {
      setRecords([]);
      setApiState('mock');
    } finally {
      setLoading(false);
    }
  }

  async function loadData(table, dbId, filters) {
    setLoading(true);
    setRecords([]);
    try {
      const params = new URLSearchParams({ dataset_id: dbId });
      Object.entries(filters || {}).forEach(([col, val]) => {
        if (val !== '') params.append(col, val);
      });
      const res = await fetch(API_BASE + '/api/table/' + table + '?' + params.toString());
      if (!res.ok) throw new Error();
      const data = await res.json();
      setRecords(data);
      setApiState('live');
    } catch {
      setRecords([]);
      setApiState('mock');
    } finally {
      setLoading(false);
    }
  }

  const apiLabel = apiState === 'live' ? 'Live API' : apiState === 'mock' ? 'Error' : 'Connecting…';
  const apiDotCls = apiState === 'live' ? 'dot-live' : apiState === 'mock' ? 'dot-mock' : 'dot-check';

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="header">
        <div className="logo">K</div>
        <span className="header-title">Product Dashboard</span>
        <div className="api-pill">
          <div className={'api-dot ' + apiDotCls} />
          {apiLabel}
        </div>
      </header>
      <div className="app-body">
        <nav className="sidebar">
          <div className="sidebar-label">Tables</div>
          <div className={'nav-item ' + (activeTable === 'overview' ? 'active' : '')} onClick={() => setActiveTable('overview')}>
            <span className="nav-icon">⬡</span>Overview
          </div>
          {tables.map(t => (
            <div key={t} className={'nav-item ' + (activeTable === t ? 'active' : '')} onClick={() => setActiveTable(t)}>
              <span className="nav-icon">⊞</span>
              {t.replace(/_/g, ' ')}
              {rowCounts[t] != null && <span className="nav-count">{rowCounts[t]}</span>}
            </div>
          ))}
          <div className="sidebar-label" style={{marginTop:'12px'}}>Dashboard</div>
          <div className={'nav-item ' + (activeTable === 'kpi' ? 'active' : '')} onClick={() => setActiveTable('kpi')}>
            <span className="nav-icon">📊</span>Product Dashboard
          </div>
          <div className="sidebar-label" style={{marginTop:'12px'}}>Views</div>
          <div className={'nav-item ' + (activeTable === 'feedback' ? 'active' : '')} onClick={() => setActiveTable('feedback')}>
            <span className="nav-icon">★</span>NJ Open Data - User Feedback
          </div>
        </nav>
        <main className="main">
          <div className="toolbar">
            <span className="section-title">{activeTable === 'overview' ? 'Overview' : activeTable === 'kpi' ? 'Product Dashboard' : activeTable === 'feedback' ? 'NJ Open Data - User Feedback' : activeTable ? activeTable.replace(/_/g, ' ') : 'Loading…'}</span>
            {activeTable !== 'overview' && !loading && records.length > 0 && (
              <span className="run-count-badge">{records.length} row{records.length !== 1 ? 's' : ''}</span>
            )}
          </div>
          {activeTable && activeTable !== 'overview' && activeTable !== 'kpi' && (
            <div className="controls">
              <div className="search-wrap">
                <span className="search-ico">🔍</span>
                <input className="search-input" placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)} />
              </div>
              {activeTable !== 'feedback' && (() => {
                const present = fkValues['dataset_id'];
                const opts = (present && present.length)
                  ? databases.filter(db => present.includes(db.dataset_id))
                  : databases;
                return <select className="db-select" value={databaseId ?? ''} onChange={e => setDatabaseId(Number(e.target.value))}>
                  {opts.map(db => <option key={db.dataset_id} value={db.dataset_id} title={db.name}>{db.name}</option>)}
                </select>;
              })()}
              {activeTable !== 'feedback' && foreignKeys.filter(fk => fk.column !== 'dataset_id').map(fk => (
                <select key={fk.column} className="db-select"
                  value={fkFilters[fk.column] ?? ''}
                  onChange={e => {
                    const newFilters = { ...fkFilters, [fk.column]: e.target.value };
                    setFkFilters(newFilters);
                    loadData(activeTable, databaseId, newFilters);
                  }}>
                  <option value="">All {fk.column.replace(/_/g, ' ')}</option>
                  {(fkValues[fk.column] || []).map(v => (
                    <option key={v} value={v}>{v}</option>
                  ))}
                </select>
              ))}
              <button className="refresh-btn" disabled={loading} onClick={() => activeTable === 'feedback' ? loadFeedback() : loadData(activeTable, databaseId, fkFilters)}>↻ Refresh</button>
              <div style={{position:'relative'}}>
                <button className="cols-toggle-btn" onClick={() => setShowColPanel(v => !v)}>⊞ Columns</button>
                {showColPanel && (
                  <div className="cols-toggle-panel">
                    {tableColumns.map(col => (
                      <label key={col} className="cols-toggle-item">
                        <input type="checkbox" checked={!hiddenCols.has(col)}
                          onChange={() => setHiddenCols(prev => { const s=new Set(prev); if(s.has(col))s.delete(col); else s.add(col); return s; })} />
                        {col === '__notes__' ? 'Notes' : col.replace(/_/g,' ')}
                      </label>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
          <div className="table-wrap">
            {activeTable === 'kpi' ? (
              <KPIDashboard />
            ) : activeTable === 'overview' ? (
              <Overview tables={tables} rowCounts={rowCounts} onSelect={t => setActiveTable(t)} />
            ) : loading ? (
              <div className="state-center"><div className="spinner" /><div className="state-msg">Loading…</div></div>
            ) : (
              <DynamicTable records={records} search={search} hiddenCols={hiddenCols} setHiddenCols={setHiddenCols} tableName={activeTable} />
            )}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
